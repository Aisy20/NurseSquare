name: cron - credential expiry reminders

# Replaces the vercel.json cron after moving to DigitalOcean App Platform.
# Same schedule as the old vercel.json entry: daily at 14:00 UTC.
#
# Requires (Settings → Secrets and variables → Actions):
#   - Variable PROD_BASE_URL  e.g. https://nursesquare.com  (no trailing slash)
#   - Secret   CRON_SECRET    same value as the app's CRON_SECRET env var
#
# The endpoint is a GET guarded by `Authorization: Bearer ${CRON_SECRET}`.

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger credential expiry reminders
        run: |
          curl -fsS --max-time 120 \
            "${{ vars.PROD_BASE_URL }}/api/ledger/credentials/cron/expiry-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
