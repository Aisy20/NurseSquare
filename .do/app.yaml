# DigitalOcean App Platform spec for NurseSquare (Next.js 16 + Supabase).
#
# Import with:
#   doctl apps create --spec .do/app.yaml
# or update an existing app:
#   doctl apps update <APP_ID> --spec .do/app.yaml
#
# Secret values (type: SECRET) are placeholders here on purpose — never commit
# real secrets. Set their actual values in the DO dashboard (Settings →
# App-Level Environment Variables) or via `doctl`, which encrypts them.
name: nursesquare
region: nyc
services:
  - name: web
    github:
      repo: Aisy20/NurseSquare
      branch: main            # ← merge your feature branch to main first, or change this
      deploy_on_push: true
    # A .node-version file pins Node 20 for the buildpack.
    build_command: npm run build
    run_command: npm run start
    environment_slug: node-js
    instance_size_slug: basic-xs   # 1 GB RAM; bump if the Next build OOMs
    instance_count: 1
    http_port: 3000
    health_check:
      http_path: /
    envs:
      # --- Public (inlined into the client bundle → must be BUILD time) ---
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}       # DO's default app URL; override with your custom domain
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_ME
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_ME
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_ME

      # --- Server-only config ---
      - key: NURSYS_BASE_URL
        scope: RUN_TIME
        value: https://api.nursys.com/api/enotify
      - key: NURSYS_API_USERNAME
        scope: RUN_TIME
        value: REPLACE_ME

      # --- Server-only secrets (set real values in the dashboard) ---
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: NURSYS_API_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME       # the rotated password
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: POSTMARK_INBOUND_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: TWILIO_AUTH_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME

      # --- Optional integrations (uncomment + set if used) ---
      # - { key: CHECKR_API_KEY, scope: RUN_TIME, type: SECRET, value: REPLACE_ME }
      # - { key: CHECKR_WEBHOOK_SECRET, scope: RUN_TIME, type: SECRET, value: REPLACE_ME }
      # - { key: CHECKR_PACKAGE_SLUG, scope: RUN_TIME, value: REPLACE_ME }
      # - { key: AHA_API_KEY, scope: RUN_TIME, type: SECRET, value: REPLACE_ME }
      # - { key: AHA_API_BASE_URL, scope: RUN_TIME, value: REPLACE_ME }
